<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 200" role="img">
  <title>Draft Bench horizontal lockup</title>
  <desc>Horizontal Draft Bench lockup for website headers and nav bars. Handwritten manuscript mark on the left, "Draft Bench" wordmark in Fraunces 600 on the right, both in graphite.</desc>
  <style>
    @font-face {
      font-family: 'Fraunces';
      font-style: normal;
      font-weight: 600;
      font-display: swap;
      src: url('https://cdn.jsdelivr.net/npm/@fontsource/fraunces@5/files/fraunces-latin-600-normal.woff2') format('woff2');
    }
  </style>
  <g transform="translate(100 100)">
    <g transform="translate(0 40) rotate(-18)">
      <rect x="-25" y="-80" width="50" height="80" rx="3" fill="none" stroke="#2B2B2D" stroke-width="2.5"/>
    </g>
    <g transform="translate(0 40) rotate(18)">
      <rect x="-25" y="-80" width="50" height="80" rx="3" fill="none" stroke="#2B2B2D" stroke-width="2.5"/>
    </g>
    <g transform="translate(0 40)">
      <rect x="-25" y="-80" width="50" height="80" rx="3" fill="none" stroke="#2B2B2D" stroke-width="2.5"/>
      <path d="M -18 -68 Q 0 -67 18 -68" fill="none" stroke="#2B2B2D" stroke-width="1.3" stroke-linecap="round"/>
      <path d="M -18 -58 Q -1.5 -57 15 -58" fill="none" stroke="#2B2B2D" stroke-width="1.3" stroke-linecap="round"/>
      <path d="M -20 -54 Q -2 -59 17 -62" fill="none" stroke="#2B2B2D" stroke-width="1.6" stroke-linecap="round"/>
      <path d="M -5 -50 Q -2.5 -52.5 0 -54 Q 2.5 -52.5 5 -50" fill="none" stroke="#2B2B2D" stroke-width="1.8" stroke-linecap="round"/>
      <path d="M -18 -48 Q 0 -47 18 -48" fill="none" stroke="#2B2B2D" stroke-width="1.3" stroke-linecap="round"/>
      <path d="M -18 -38 Q -4 -37 10 -38" fill="none" stroke="#2B2B2D" stroke-width="1.3" stroke-linecap="round"/>
      <path d="M -18 -28 Q -6.5 -27.3 5 -28" fill="none" stroke="#2B2B2D" stroke-width="1.3" stroke-linecap="round"/>
    </g>
  </g>
  <line x1="215" y1="60" x2="215" y2="140" stroke="#2B2B2D" stroke-width="1" opacity="0.3"/>
  <text x="240" y="125" font-family="Fraunces, Georgia, serif" font-size="60" font-weight="600" fill="#2B2B2D" letter-spacing="0.5">Draft Bench</text>
</svg>
