<?xml version="1.0" encoding="UTF-8"?>
<!--
  Draft Bench logo (T5 composition)
  
  A desk viewed from a three-quarter angle, with documents at three levels
  of granularity: a chapter stack (back), a scene page (overlapping in front),
  and a small beat slip (tucked to the side).
  
  Uses currentColor for strokes so it inherits the surrounding text color,
  making it theme-compatible in both light and dark contexts.
  
  Stroke widths and opacities are calibrated for display sizes 96px and up.
  For smaller renderings (24-64px), see logo-mark.svg.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="512" height="512" role="img" aria-label="Draft Bench logo">
  <title>Draft Bench</title>

  <!-- Desk surface (three-quarter angle, back edge higher than front) -->
  <path
    d="M2 22 L62 16 L62 54 L2 60 Z"
    fill="none"
    stroke="currentColor"
    stroke-width="2.5"
    stroke-linecap="round"
    stroke-linejoin="round"
    opacity="0.4"/>
  
  <!-- Desk front edge, slightly stronger to anchor the bottom -->
  <line
    x1="2" y1="60" x2="62" y2="54"
    stroke="currentColor"
    stroke-width="2.5"
    stroke-linecap="round"
    opacity="0.5"/>

  <!-- Chapter stack (back): three pages, each offset and stepped in opacity -->
  <g transform="skewY(-4)">
    <rect x="30" y="18" width="18" height="24" rx="1"
      fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.3"/>
    <rect x="28" y="20" width="18" height="24" rx="1"
      fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.5"/>
    <rect x="26" y="22" width="18" height="24" rx="1"
      fill="none" stroke="currentColor" stroke-width="2"/>
  </g>

  <!-- Scene page (center-front, overlapping the chapter stack) -->
  <!-- Filled with the background color so it visually sits in front -->
  <g transform="skewY(-4)">
    <rect x="14" y="28" width="20" height="26" rx="1.5"
      fill="var(--background-primary, white)"
      stroke="currentColor" stroke-width="2.2"/>
    <!-- Text lines on the scene page -->
    <line x1="18" y1="34" x2="30" y2="34"
      stroke="currentColor" stroke-width="1.5" opacity="0.45"/>
    <line x1="18" y1="38" x2="28" y2="38"
      stroke="currentColor" stroke-width="1.5" opacity="0.45"/>
    <line x1="18" y1="42" x2="30" y2="42"
      stroke="currentColor" stroke-width="1.5" opacity="0.45"/>
    <line x1="18" y1="46" x2="25" y2="46"
      stroke="currentColor" stroke-width="1.5" opacity="0.45"/>
  </g>

  <!-- Beat slip (small, tucked to the right-front) -->
  <g transform="skewY(-4)">
    <rect x="44" y="42" width="12" height="14" rx="0.5"
      fill="var(--background-primary, white)"
      stroke="currentColor" stroke-width="1.8"/>
    <line x1="46" y1="47" x2="53" y2="47"
      stroke="currentColor" stroke-width="1.5" opacity="0.5"/>
    <line x1="46" y1="50" x2="51" y2="50"
      stroke="currentColor" stroke-width="1.5" opacity="0.5"/>
  </g>
</svg>
