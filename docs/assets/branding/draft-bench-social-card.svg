<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img">
  <title>Draft Bench — A writing workflow for Obsidian</title>
  <desc>Social card for Draft Bench at 1200 by 630 pixels. The handwritten manuscript mark in graphite on the left; to the right, "Draft Bench" set large with the tagline "A writing workflow for Obsidian." beneath, all on an ivory ground.</desc>
  <style>
